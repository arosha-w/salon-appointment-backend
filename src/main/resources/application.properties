# ============================================================================
# SPRING BOOT APPLICATION - SALON BOOKING SYSTEM
# ============================================================================

spring.application.name=saloon-backend

# ============================================================================
# DATABASE CONFIGURATION - SUPABASE (CORRECT FORMAT)
# ============================================================================

# Database URL - HOST ONLY (no username/password here!)
spring.datasource.url=jdbc:postgresql://db.ziawakugxdudprytrhms.supabase.co:5432/postgres

# Username - SEPARATE property
spring.datasource.username=postgres

# Password - SEPARATE property
spring.datasource.password=q73ZtRW9dFuNp2u7

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================================

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto - Auto-create tables
spring.jpa.hibernate.ddl-auto=validate

# Show SQL queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable OSIV
spring.jpa.open-in-view=false

# ============================================================================
# CONNECTION POOL
# ============================================================================

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000

# ============================================================================
# SERVER
# ============================================================================

server.port=8080

# ============================================================================
# CORS
# ============================================================================

cors.allowed.origins=http://localhost:3000

# ============================================================================
# JWT
# ============================================================================

jwt.secret=your-super-secret-jwt-key-minimum-32-characters-required-here
jwt.expiration=86400000

# ============================================================================
# ACTUATOR
# ============================================================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================================
# LOGGING
# ============================================================================

logging.level.root=INFO
logging.level.com.saloon=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG